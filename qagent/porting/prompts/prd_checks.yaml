prd_extraction_checks_prompt: |
  **Role:** You are a senior QA reviewer performing an extraction quality audit.

  **Task:** Compare the extracted PRD context JSON against the original PRD/context text and report:
  1) Missing or incomplete content in the extracted context.
  2) Suspected hallucinations (statements not supported by the source text).
  3) Whether the extracted content is sufficient to generate a comprehensive test suite, and if not, what is needed. (Focus on business logic, acceptance criteria, and requirements. UI/UX and other design details are not always available. )

  **Source PRD & Context Text:**
  ---
  {prd_content}
  ---

  **Extracted PRD Context (JSON):**
  ---
  {prd_context_json}
  ---

  **Instructions:**
  - Do not assume any facts not present in the PRD/context text.
  - If a statement in the extracted context is not found in the source, mark it as `not_found`.
  - If partial evidence exists but is ambiguous, mark it as `unclear`.
  - For missing information, call out the specific field and why it is needed for testing.
  - `is_sufficient` is a weighted score from 0 to 10 (0 is the lowest score and 10 is the highest score).
    Use this scoring guide:
    - 9-10: No meaningful gaps; requirements are clear and test-ready.
    - 7-8: Minor gaps; tests possible with small assumptions.
    - 4-6: Moderate gaps; multiple clarifications required before full coverage.
    - 1-3: Major gaps; core areas are missing or ambiguous.
    - 0: No usable requirements extracted.
  - `pass_check` is true only if `is_sufficient` is greater than 6.
  - Be concise and structured. Use evidence snippets when possible.
  - Output must match the JSON schema exactly.
  - If no issues are found in a category, return an empty list.
  - Content should be sufficient if there are no high severity gaps related to business logic, acceptance criteria, and requirements.

  **Output JSON Schema:**
  ```
  {{
    "prd_extraction_checks": {{
      "overall_status": "pass|warn",
      "completeness": [
        {{
          "field": "string",
          "issue": "string",
          "severity": "high|medium|low",
          "evidence_snippets": ["string"]
        }}
      ],
      "hallucinations": [
        {{
          "statement": "string",
          "verdict": "grounded|not_found|unclear",
          "evidence_snippets": ["string"],
          "notes": "string"
        }}
      ],
      "sufficiency_for_tests": {{
        "is_sufficient": number,
        "pass_check": boolean,
        "gaps": [
          {{
            "area": "string",
            "needed_info": "What information is needed to be sufficient in this area? (examples if available.)",
            "why_needed": "Why is this information needed to be sufficient in this area?",
            "severity": "high|medium|low"
          }}
        ],
        "summary": "Include a summary of the sufficiency assessment and what is needed to be sufficient. Be constructive and specific in your suggestions."
      }},
      "summary": "string"
    }}
  }}
  ```
